<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบบันทึกลูกค้าฝากขายที่ดิน</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap');

  :root{
    --paper: #F3ECDC;
    --paper-dark: #EAE0C8;
    --ink: #2E2A22;
    --ink-soft: #6B6355;
    --clay: #B5562E;
    --clay-dark: #8C3E1F;
    --pine: #2F4A3A;
    --pine-dark: #1F3328;
    --gold: #A6792E;
    --line: #D8CBA8;
    --danger: #A33B2C;
    --card: #FBF7EC;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Sarabun', 'Leelawadee UI', 'Tahoma', sans-serif;
    line-height: 1.6;
  }

  .wrap{
    max-width: 980px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ===== Header — deed-seal motif ===== */
  .header{
    display:flex;
    align-items:center;
    gap: 18px;
    padding-bottom: 18px;
    margin-bottom: 22px;
    border-bottom: 2px solid var(--gold);
    position: relative;
  }
  .header::after{
    content:"";
    position:absolute;
    bottom:-6px; left:0; right:0;
    height:1px;
    background-image: repeating-linear-gradient(to right, var(--gold) 0 6px, transparent 6px 12px);
    opacity:0.6;
  }
  .seal{
    width:90px; height:90px; border-radius:50%;
    flex-shrink:0;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    background: var(--card);
  }
  .seal img{
    width:100%; height:100%;
    object-fit: cover;
    display:block;
  }
  .header h1{
    font-size: 22px;
    font-weight: 700;
    margin: 0;
    color: var(--pine-dark);
    letter-spacing: 0.2px;
  }
  .header p{
    margin: 2px 0 0;
    font-size: 13.5px;
    color: var(--ink-soft);
  }

  /* ===== Cards ===== */
  .card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px 22px;
    margin-bottom: 24px;
  }
  .card h2{
    font-size: 16px;
    font-weight:600;
    margin: 0 0 16px;
    color: var(--pine-dark);
    display:flex; align-items:center; gap:8px;
  }
  .card h2::before{
    content:"";
    width:6px; height:6px;
    background: var(--clay);
    border-radius:50%;
    display:inline-block;
  }

  /* ===== Form ===== */
  .form-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px 16px;
  }
  .field{ display:flex; flex-direction:column; gap:5px; }
  .field.full{ grid-column: 1 / -1; }
  .field label{
    font-size: 12.5px;
    font-weight:600;
    color: var(--ink-soft);
  }
  .field label .req{ color: var(--clay); }
  .field input, .field textarea{
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 6px;
    padding: 9px 11px;
    font-family: inherit;
    font-size: 14.5px;
    color: var(--ink);
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus, .field textarea:focus{
    border-color: var(--pine);
    box-shadow: 0 0 0 2px rgba(47,74,58,0.12);
  }
  .field textarea{ resize: vertical; min-height: 64px; }

  .form-actions{
    display:flex; gap:10px; margin-top:18px; align-items:center;
  }
  .btn{
    border:none; border-radius:7px;
    padding: 10px 20px;
    font-family:inherit; font-size:14.5px; font-weight:600;
    cursor:pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn:active{ transform: scale(0.98); }
  .btn-primary{ background: var(--pine); color: #F3ECDC; }
  .btn-primary:hover{ background: var(--pine-dark); }
  .btn-ghost{ background: transparent; color: var(--ink-soft); border: 1px solid var(--line); }
  .btn-ghost:hover{ background: var(--paper-dark); }
  .edit-flag{
    font-size: 13px; color: var(--clay-dark); font-weight:600;
    display:none;
  }

  /* ===== Toolbar ===== */
  .toolbar{
    display:flex; gap:12px; align-items:center; margin-bottom: 16px; flex-wrap:wrap;
  }
  .toolbar input[type="text"]{
    flex:1; min-width:180px;
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 7px;
    padding: 9px 12px;
    font-family: inherit; font-size: 14.5px;
    color: var(--ink);
    outline:none;
  }
  .toolbar input[type="text"]:focus{ border-color: var(--pine); }
  .count-pill{
    font-size: 13px; color: var(--pine-dark); font-weight:600;
    background: var(--paper-dark);
    padding: 7px 13px; border-radius: 20px;
    white-space:nowrap;
  }

  /* ===== List ===== */
  .empty{
    text-align:center;
    padding: 40px 20px;
    color: var(--ink-soft);
  }
  .empty .stamp{ font-size:34px; margin-bottom:10px; opacity:0.5; }

  .record{
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 4px solid var(--clay);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 12px;
    display:grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items:start;
  }
  .record .name{
    font-size: 16px; font-weight:700; color: var(--pine-dark);
  }
  .record .meta-row{
    display:flex; flex-wrap:wrap; gap: 16px;
    margin-top: 6px;
    font-size: 13.5px;
    color: var(--ink-soft);
  }
  .record .meta-row span b{
    color: var(--ink); font-weight:600;
  }
  .record .notes{
    margin-top: 8px;
    font-size: 13.5px;
    color: var(--ink-soft);
    border-top: 1px dashed var(--line);
    padding-top: 8px;
  }
  .record .date{
    font-size: 11.5px; color: var(--ink-soft); opacity:0.7;
    margin-top:8px;
  }
  .record-actions{
    display:flex; flex-direction:column; gap:6px;
  }
  .icon-btn{
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 6px;
    width: 32px; height:32px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; font-size: 14px;
    color: var(--ink-soft);
  }
  .icon-btn:hover{ background: var(--paper-dark); }
  .icon-btn.danger:hover{ color: var(--danger); border-color: var(--danger); }
  .icon-btn.map-btn{
    color: var(--pine);
    border-color: var(--pine);
    background: var(--paper);
  }
  .icon-btn.map-btn:hover{ background: var(--pine); color: var(--card); }

  /* ===== Backup banner & controls ===== */
  .backup-banner{
    display:flex; align-items:center; justify-content:space-between;
    gap: 12px; flex-wrap:wrap;
    background: #F4E7CC;
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 13.5px;
    color: var(--clay-dark);
  }
  .backup-banner strong{ color: var(--ink); }
  .backup-bar{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    margin-bottom: 14px;
  }
  .backup-bar .last-backup{
    font-size: 12.5px; color: var(--ink-soft);
  }
  .btn-sm{
    padding: 7px 14px; font-size: 13px; border-radius: 6px;
  }
  #import-input{ display:none; }

  /* ===== Google Drive panel ===== */
  .drive-panel{
    display:flex; align-items:center; justify-content:space-between;
    gap: 12px; flex-wrap:wrap;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }
  .drive-status{
    display:flex; align-items:center; gap:8px;
    font-size: 13.5px; color: var(--ink-soft);
  }
  .drive-dot{
    width:9px; height:9px; border-radius:50%;
    background: var(--danger);
    flex-shrink:0;
  }
  .drive-dot.on{ background: var(--pine); }
  .drive-actions{ display:flex; gap:8px; flex-wrap:wrap; }

  /* ===== Deed image upload ===== */
  .img-field{
    display:flex; flex-direction:column; gap:8px;
  }
  .img-field .img-row{
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .img-thumb{
    width: 64px; height: 64px;
    border-radius: 6px;
    border: 1px solid var(--line);
    object-fit: cover;
    background: var(--paper);
    display:block;
  }
  .img-placeholder{
    width: 64px; height: 64px;
    border-radius: 6px;
    border: 1px dashed var(--line);
    background: var(--paper);
    display:flex; align-items:center; justify-content:center;
    color: var(--ink-soft);
    font-size: 11px;
    text-align:center;
  }
  .file-label{
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13.5px;
    color: var(--ink-soft);
    cursor:pointer;
    display:inline-block;
  }
  .file-label .cam-icon{
    font-style: normal;
    margin-right: 4px;
  }
  .file-label:hover{ background: var(--paper-dark); }
  .img-field input[type="file"]{ display:none; }
  .img-remove-btn{
    font-size: 12.5px; color: var(--danger);
    background:none; border:none; text-decoration:underline; cursor:pointer; padding:0;
  }
  .icon-btn.deed-btn{
    color: var(--gold);
    border-color: var(--gold);
    background: var(--paper);
  }
  .icon-btn.deed-btn:hover{ background: var(--gold); color: var(--card); }

  .lightbox-overlay{
    display:none;
    position: fixed; inset:0;
    background: rgba(30,26,18,0.78);
    z-index: 999;
    align-items:center; justify-content:center;
    padding: 24px;
  }
  .lightbox-overlay.open{ display:flex; }
  .lightbox-box{
    background: var(--card);
    border-radius: 10px;
    padding: 14px;
    max-width: 92vw; max-height: 88vh;
    display:flex; flex-direction:column; gap:10px;
  }
  .lightbox-box img{
    max-width: 100%; max-height: 72vh;
    border-radius: 6px;
    display:block;
    margin: 0 auto;
  }
  .lightbox-header{
    display:flex; justify-content:space-between; align-items:center;
    font-size: 14px; font-weight:600; color: var(--pine-dark);
  }
  .lightbox-header button{
    border:none; background:none; cursor:pointer;
    font-size: 18px; color: var(--ink-soft); line-height:1;
  }

  @media (max-width: 620px){
    .form-grid{ grid-template-columns: 1fr; }
    .record{ grid-template-columns: 1fr; }
    .record-actions{ flex-direction:row; }
  }
</style>
</head>

" alt="ตราครุฑ"></div>
    <div>
      <h1>ระบบบันทึกลูกค้าฝากขายที่ดิน</h1>
      <p>คลังข้อมูลสัญญา และทำเลที่ดินออนไลน์ อีสานตอนใต้</p>
    </div>
  </div>

  <div class="drive-panel">
    <div class="drive-status">
      <div id="drive-dot" class="drive-dot"></div>
      <span id="login-status">ไม่ได้เชื่อมต่อ Google Drive (ข้อมูลจะเซฟในเครื่องเท่านั้น)</span>
    </div>
    <div class="drive-actions">
      <button id="btn-login" onclick="handleAuthClick()" class="btn btn-primary btn-sm">เข้าสู่ระบบ Google</button>
      <button id="btn-logout" onclick="handleSignoutClick()" class="btn btn-ghost btn-sm" style="display:none;">ตัดการเชื่อมต่อ</button>
    </div>
  </div>

  <div class="card">
    <h2>บันทึกข้อมูลที่ดินรายใหม่ <span id="edit-flag" class="edit-flag">(กำลังแก้ไขข้อมูล)</span></h2>
    <form id="land-form" onsubmit="saveRecord(event)">
      <div class="form-grid">
        <div class="field">
          <label>ชื่อ-นามสกุล ลูกค้า <span class="req">*</span></label>
          <input type="text" id="f-name" required placeholder="เช่น นายสมชาย ดีใจ">
        </div>
        <div class="field">
          <label>เบอร์โทรศัพท์ <span class="req">*</span></label>
          <input type="text" id="f-phone" required placeholder="เช่น 081-234-5678">
        </div>
        <div class="field">
          <label>ราคาฝากขาย (บาท) <span class="req">*</span></label>
          <input type="number" id="f-price" required placeholder="เช่น 2500000">
        </div>
        <div class="field">
          <label>เนื้อที่ (ไร่ - งาน - วา) <span class="req">*</span></label>
          <input type="text" id="f-area" required placeholder="เช่น 5 ไร่ 2 งาน 30 วา">
        </div>
        <div class="field">
          <label>เลขที่โฉนด / ที่ตั้ง</label>
          <input type="text" id="f-deed" placeholder="เช่น โฉนดเลขที่ 12345 ต.ในเมือง">
        </div>
        <div class="field">
          <label>พิกัด GPS (ละติจูด, ลองจิจูด)</label>
          <input type="text" id="f-coords" placeholder="เช่น 15.2345, 104.8765">
        </div>
        <div class="field fullimg img-field">
          <label>รูปภาพโฉนดที่ดิน / เอกสารสิทธิ์</label>
          <div class="img-row">
            <div id="thumb-front-zone">
              <div class="img-placeholder">ด้านหน้า</div>
            </div>
            <div>
              <label class="file-label" for="f-img-front"><i class="cam-icon">📷</i> เลือกรูปด้านหน้า</label>
              <input type="file" id="f-img-front" accept="image/*" onchange="previewImage(this, 'front')">
              <div id="remove-front-zone" style="margin-top:4px;"></div>
            </div>
          </div>
          <div class="img-row" style="margin-top: 8px;">
            <div id="thumb-back-zone">
              <div class="img-placeholder">ด้านหลัง</div>
            </div>
            <div>
              <label class="file-label" for="f-img-back"><i class="cam-icon">📷</i> เลือกรูปด้านหลัง</label>
              <input type="file" id="f-img-back" accept="image/*" onchange="previewImage(this, 'back')">
              <div id="remove-back-zone" style="margin-top:4px;"></div>
            </div>
          </div>
        </div>
        <div class="field full">
          <label>หมายเหตุ / รายละเอียดเพิ่มเติม</label>
          <textarea id="f-notes" placeholder="ระบุรายละเอียดทำเล ทางเข้า น้ำไฟ หรือเงื่อนไขเพิ่มเติม..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="submit-btn">บันทึกข้อมูล</button>
        <button type="button" class="btn btn-ghost" onclick="resetForm()" id="cancel-btn" style="display:none;">ยกเลิก</button>
      </div>
    </form>
  </div>

  <div class="backup-bar">
    <span class="count-pill" id="total-count">ข้อมูลทั้งหมด: 0 รายการ</span>
    <button class="btn btn-ghost btn-sm" onclick="exportData()">📥 ส่งออกไฟล์สำรอง (เครื่อง)</button>
    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('import-input').click()">📤 นำเข้าไฟล์สำรอง</button>
    <input type="file" id="import-input" accept=".json" onchange="importData(this)">
    <span class="last-backup" id="sync-time"></span>
  </div>

  <div class="toolbar">
    <input type="text" id="search-box" oninput="renderList()" placeholder="🔍 ค้นหาด้วย ชื่อ, เบอร์โทร, ทำเล หรือหมายเหตุ...">
  </div>

  <div id="records-list"></div>

</div>

<div id="lightbox" class="lightbox-overlay" onclick="closeLightbox()">
  <div class="lightbox-box" onclick="event.stopPropagation()">
    <div class="lightbox-header">
      <span id="lightbox-title">รูปภาพหลักฐาน</span>
      <button onclick="closeLightbox()">&times;</button>
    </div>
    <img id="lightbox-img" src="" alt="ขยายรูป">
  </div>
</div>

<script>
const GOOGLE_CLIENT_ID = '203310648822-st6pfgi8f8mdpgjcdvvue0mkgf6nr459.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const BACKUP_FILE_NAME = 'land_records_backup.json';

let tokenClient;
let accessToken = null;
let records = [];
let editingId = null;

let pendingFrontImage = null;
let pendingBackImage = null;
let removeFrontFlag = false;
let removeBackFlag = false;

// เริ่มต้นโหลดข้อมูลเบื้องต้นจากหน่วยความจำเครื่อง
window.addEventListener('DOMContentLoaded', () => {
  initStorage();
  loadLocalData();
  renderList();
  
  // บังคับรันเรียกใช้ Google API หลังเปิดเว็บหน้าจอเสร็จสิ้น
  if (typeof gapi !== 'undefined') {
      gapi.load('client', initializeGapiClient);
  }
});

async function initializeGapiClient() {
    try {
        await gapi.client.init({
            discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
        });
        
        // ประกาศตัวเรียกหน้าต่างระบบล็อกอินแบบใหม่ของ Google
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: SCOPES,
            callback: async (resp) => {
                if (resp.error !== undefined) {
                    throw (resp);
                }
                accessToken = resp.access_token;
                updateDriveStatus(true);
                await syncWithGoogleDrive();
            },
        });
    } catch (error) {
        console.error('ไม่สามารถเปิดใช้งาน Google Drive API ได้:', error);
    }
}

function handleAuthClick() {
    if (tokenClient) {
        // บังคับหน้าต่างป๊อปอัปสีขาวเด้งเรียกบัญชี
        tokenClient.requestAccessToken({prompt: 'consent'});
    } else {
        alert('ระบบล็อกอินกำลังโหลด กรุณารอสักครู่แล้วกดใหม่อีกครั้งครับ');
    }
}

function handleSignoutClick() {
    if (accessToken) {
        google.accounts.oauth2.revoke(accessToken);
        accessToken = null;
        updateDriveStatus(false);
    }
}

function updateDriveStatus(isConnected) {
  const dot = document.getElementById('drive-dot');
  const txt = document.getElementById('login-status');
  const btnLogin = document.getElementById('btn-login');
  const btnLogout = document.getElementById('btn-logout');

  if(isConnected) {
    dot.classList.add('on');
    txt.innerText = "เชื่อมต่อฐานข้อมูล Google Drive เรียบร้อยแล้ว";
    btnLogin.style.display = 'none';
    btnLogout.style.display = 'inline-block';
  } else {
    dot.classList.remove('on');
    txt.innerText = "ไม่ได้เชื่อมต่อ Google Drive (ข้อมูลจะเซฟในเครื่องเท่านั้น)";
    btnLogin.style.display = 'inline-block';
    btnLogout.style.display = 'none';
  }
}

// -----------------------------------------------------------------
// ระบบจัดเก็บข้อมูลสำรองและพิกัดแผนที่ภายในเครื่อง
// -----------------------------------------------------------------
function initStorage(){
  if(!window.storage){
    window.storage = {
      _data: {},
      get: function(k){ return Promise.resolve(localStorage.getItem(k)); },
      set: function(k,v){ localStorage.setItem(k,v); return Promise.resolve(); },
      delete: function(k){ localStorage.removeItem(k); return Promise.resolve(); },
      keys: function(){ return Promise.resolve(Object.keys(localStorage)); }
    };
  }
}

function loadLocalData(){
  const s = localStorage.getItem('land_records');
  if(s){
    try{ records = JSON.parse(s); }catch(e){ records = []; }
  }else{
    records = [];
  }
}

function saveLocalData(){
  localStorage.setItem('land_records', JSON.stringify(records));
}

function imageKey(id, side){ return `img_${id}_${side}`; }

function renderList(){
  const q = document.getElementById('search-box').value.trim().toLowerCase();
  const listDiv = document.getElementById('records-list');
  listDiv.innerHTML = '';

  const filtered = records.filter(r => {
    return (r.name && r.name.toLowerCase().includes(q)) ||
           (r.phone && r.phone.includes(q)) ||
           (r.deed && r.deed.toLowerCase().includes(q)) ||
           (r.notes && r.notes.toLowerCase().includes(q));
  });

  document.getElementById('total-count').innerText = `ข้อมูลทั้งหมด: ${filtered.length} รายการ`;

  if(filtered.length === 0){
    listDiv.innerHTML = `
      <div class="card empty">
        <div class="stamp">📜</div>
        <div>ไม่พบข้อมูลรายชื่อหรือแปลงที่ดินที่ค้นหา</div>
      </div>`;
    return;
  }

  // จัดเรียงข้อมูลล่าสุดขึ้นก่อน
  filtered.sort((a,b) => b.timestamp - a.timestamp);

  filtered.forEach(r => {
    const item = document.createElement('div');
    item.className = 'record';

    let noteBlock = '';
    if(r.notes){
      noteBlock = `<div class="notes">${r.notes.replace(/\n/g, '<br>')}</div>`;
    }

    let mapBtn = '';
    if(r.coords){
      mapBtn = `
        <button class="icon-btn map-btn" onclick="openMap('${r.coords}')" title="เปิดแผนที่นำทาง">
          📍
        </button>`;
    }

    let frontBtn = '';
    if(r.hasFront){
      frontBtn = `<button class="icon-btn deed-btn" onclick="viewDeed('${r.id}', 'front', '${r.name}')" title="ดูโฉนดด้านหน้า">📄</button>`;
    }
    let backBtn = '';
    if(r.hasBack){
      backBtn = `<button class="icon-btn deed-btn" onclick="viewDeed('${r.id}', 'back', '${r.name}')" title="ดูโฉนดด้านหลัง">📑</button>`;
    }

    const dStr = new Date(r.timestamp).toLocaleString('th-TH');

    item.innerHTML = `
      <div>
        <div class="name">${r.name}</div>
        <div class="meta-row">
          <span><b>📞 เบอร์โทร:</b> ${r.phone}</span>
          <span><b>💰 ราคาขาย:</b> ${Number(r.price).toLocaleString()} บาท</span>
          <span><b>📐 เนื้อที่:</b> ${r.area}</span>
          <span><b>📂 เอกสารสิทธิ์:</b> ${r.deed || '-'}</span>
        </div>
        ${noteBlock}
        <div class="date">บันทึกเมื่อ: ${dStr}</div>
      </div>
      <div class="record-actions">
        <button class="icon-btn" onclick="editRecord('${r.id}')" title="แก้ไขข้อมูล">✏️</button>
        <button class="icon-btn danger" onclick="deleteRecord('${r.id}')" title="ลบข้อมูล">🗑️</button>
        ${mapBtn}
        ${frontBtn}
        ${backBtn}
      </div>
    `;
    listDiv.appendChild(item);
  });
}

function genId(){ return 'rec_' + Date.now() + '_' + Math.floor(Math.random()*1000); }

function previewImage(input, side){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    const base64 = e.target.result;
    if(side === 'front'){
      pendingFrontImage = base64;
      removeFrontFlag = false;
      document.getElementById('thumb-front-zone').innerHTML = `<img src="${base64}" class="img-thumb">`;
      document.getElementById('remove-front-zone').innerHTML = `<button type="button" class="img-remove-btn" onclick="clearPreview('front')">ลบรูปนี้</button>`;
    }else{
      pendingBackImage = base64;
      removeBackFlag = false;
      document.getElementById('thumb-back-zone').innerHTML = `<img src="${base64}" class="img-thumb">`;
      document.getElementById('remove-back-zone').innerHTML = `<button type="button" class="img-remove-btn" onclick="clearPreview('back')">ลบรูปนี้</button>`;
    }
  };
  reader.readAsDataURL(file);
}

function clearPreview(side){
  if(side === 'front'){
    pendingFrontImage = null;
    removeFrontFlag = true;
    document.getElementById('thumb-front-zone').innerHTML = `<div class="img-placeholder">ด้านหน้า</div>`;
    document.getElementById('remove-front-zone').innerHTML = '';
    document.getElementById('f-img-front').value = '';
  }else{
    pendingBackImage = null;
    removeBackFlag = true;
    document.getElementById('thumb-back-zone').innerHTML = `<div class="img-placeholder">ด้านหลัง</div>`;
    document.getElementById('remove-back-zone').innerHTML = '';
    document.getElementById('f-img-back').value = '';
  }
}

async function saveRecord(e){
  e.preventDefault();

  const data = {
    name: document.getElementById('f-name').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    price: parseFloat(document.getElementById('f-price').value) || 0,
    area: document.getElementById('f-area').value.trim(),
    deed: document.getElementById('f-deed').value.trim(),
    coords: document.getElementById('f-coords').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
  };

  const id = editingId || genId();

  let hasFront = editingId ? (records.find(r => r.id === id)?.hasFront || false) : false;
  let hasBack = editingId ? (records.find(r => r.id === id)?.hasBack || false) : false;

  if(pendingFrontImage){
    await window.storage.set(imageKey(id, 'front'), pendingFrontImage, false);
    hasFront = true;
  }else if(removeFrontFlag){
    try{ await window.storage.delete(imageKey(id, 'front'), false); }catch(err){}
    hasFront = false;
  }

  if(pendingBackImage){
    await window.storage.set(imageKey(id, 'back'), pendingBackImage, false);
    hasBack = true;
  }else if(removeBackFlag){
    try{ await window.storage.delete(imageKey(id, 'back'), false); }catch(err){}
    hasBack = false;
  }

  data.hasFront = hasFront;
  data.hasBack = hasBack;

  if(editingId){
    const idx = records.findIndex(r => r.id === editingId);
    if(idx !== -1){
      records[idx] = { ...records[idx], ...data, timestamp: Date.now() };
    }
  }else{
    data.id = id;
    data.timestamp = Date.now();
    records.push(data);
  }

  saveLocalData();
  resetForm();
  renderList();
  
  if(accessToken){
    await syncWithGoogleDrive();
  }
}

async function editRecord(id){
  const r = records.find(item => item.id === id);
  if(!r) return;

  editingId = id;
  document.getElementById('edit-flag').style.display = 'inline';
  document.getElementById('cancel-btn').style.display = 'inline-block';
  document.getElementById('submit-btn').innerText = "บันทึกการแก้ไข";

  document.getElementById('f-name').value = r.name || '';
  document.getElementById('f-phone').value = r.phone || '';
  document.getElementById('f-price').value = r.price || '';
  document.getElementById('f-area').value = r.area || '';
  document.getElementById('f-deed').value = r.deed || '';
  document.getElementById('f-coords').value = r.coords || '';
  document.getElementById('f-notes').value = r.notes || '';

  pendingFrontImage = null;
  pendingBackImage = null;
  removeFrontFlag = false;
  removeBackFlag = false;

  if(r.hasFront){
    const imgData = await window.storage.get(imageKey(id, 'front'));
    if(imgData){
      document.getElementById('thumb-front-zone').innerHTML = `<img src="${imgData}" class="img-thumb">`;
      document.getElementById('remove-front-zone').innerHTML = `<button type="button" class="img-remove-btn" onclick="clearPreview('front')">ลบรูปนี้</button>`;
    }
  }else{
    document.getElementById('thumb-front-zone').innerHTML = `<div class="img-placeholder">ด้านหน้า</div>`;
    document.getElementById('remove-front-zone').innerHTML = '';
  }

  if(r.hasBack){
    const imgData = await window.storage.get(imageKey(id, 'back'));
    if(imgData){
      document.getElementById('thumb-back-zone').innerHTML = `<img src="${imgData}" class="img-thumb">`;
      document.getElementById('remove-back-zone').innerHTML = `<button type="button" class="img-remove-btn" onclick="clearPreview('back')">ลบรูปนี้</button>`;
    }
  }else{
    document.getElementById('thumb-back-zone').innerHTML = `<div class="img-placeholder">ด้านหลัง</div>`;
    document.getElementById('remove-back-zone').innerHTML = '';
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deleteRecord(id){
  if(!confirm('คุณแน่ใจหรือไม่ว่าต้องการลบข้อมูลรายการนี้?')) return;

  records = records.filter(r => r.id !== id);
  try{ await window.storage.delete(imageKey(id, 'front')); }catch(e){}
  try{ await window.storage.delete(imageKey(id, 'back')); }catch(e){}

  saveLocalData();
  renderList();

  if(accessToken){
    await syncWithGoogleDrive();
  }
}

function resetForm(){
  editingId = null;
  document.getElementById('land-form').reset();
  document.getElementById('edit-flag').style.display = 'none';
  document.getElementById('cancel-btn').style.display = 'none';
  document.getElementById('submit-btn').innerText = "บันทึกข้อมูล";

  pendingFrontImage = null;
  pendingBackImage = null;
  removeFrontFlag = false;
  removeBackFlag = false;

  document.getElementById('thumb-front-zone').innerHTML = `<div class="img-placeholder">ด้านหน้า</div>`;
  document.getElementById('remove-front-zone').innerHTML = '';
  document.getElementById('thumb-back-zone').innerHTML = `<div class="img-placeholder">ด้านหลัง</div>`;
  document.getElementById('remove-back-zone').innerHTML = '';
}

function openMap(coords){
  const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(coords)}`;
  window.open(url, '_blank');
}

async function viewDeed(id, side, name){
  const imgData = await window.storage.get(imageKey(id, side));
  if(imgData){
    document.getElementById('lightbox-img').src = imgData;
    document.getElementById('lightbox-title').innerText = `หลักฐานโฉนดที่ดิน (${side==='front'?'ด้านหน้า':'ด้านหลัง'}) - คุณ ${name}`;
    document.getElementById('lightbox').classList.add('open');
  }else{
    alert('ไม่พบข้อมูลรูปภาพหลักฐานชุดนี้ในความจำเครื่อง');
  }
}

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}

// -----------------------------------------------------------------
// ระบบขับเคลื่อนการสำรองข้อมูลขึ้นระบบ Google Drive สำเร็จรูป
// -----------------------------------------------------------------
async function syncWithGoogleDrive() {
  if(!accessToken) return;
  try {
    // 1. ค้นหาไฟล์สำรองเก่าที่มีอยู่แล้วบน Google Drive
    const response = await gapi.client.drive.files.list({
      q: `name='${BACKUP_FILE_NAME}' and trashed=false`,
      fields: 'files(id, name)',
    });
    const files = response.result.files;

    // รวบรวมข้อมูลโฉนดฐานรูปภาพและข้อความทั้งหมดเพื่อส่งขี้นคลาวด์
    const bundle = {
      records: records,
      images: {}
    };

    for(let r of records){
      if(r.hasFront){
        bundle.images[imageKey(r.id, 'front')] = await window.storage.get(imageKey(r.id, 'front'));
      }
      if(r.hasBack){
        bundle.images[imageKey(r.id, 'back')] = await window.storage.get(imageKey(r.id, 'back'));
      }
    }

    const contentStr = JSON.stringify(bundle);

    if (files && files.length > 0) {
      // อัปเดตไฟล์เดิมที่มีอยู่แล้ว
      const fileId = files[0].id;
      await gapi.client.request({
        path: `/upload/drive/v3/files/${fileId}`,
        method: 'PATCH',
        params: { uploadType: 'media' },
        body: contentStr
      });
    } else {
      // สร้างไฟล์ใหม่ในคลาวด์ไดรฟ์ครั้งแรก
      const metadata = {
        name: BACKUP_FILE_NAME,
        mimeType: 'application/json'
      };
      await gapi.client.request({
        path: '/upload/drive/v3/files',
        method: 'POST',
        params: { uploadType: 'multipart' },
        body: `--foo\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n--foo\r\nContent-Type: application/json\r\n\r\n${contentStr}\r\n--foo--`
      });
    }

    document.getElementById('sync-time').innerText = `อัปเดตข้อมูลบนคลาวด์ล่าสุด: ${new Date().toLocaleTimeString('th-TH')}`;
  } catch (error) {
    console.error('ระบบซิงค์ Google Drive ขัดข้อง:', error);
  }
}

function exportData(){
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(records));
  const dlAnchor = document.createElement('a');
  dlAnchor.setAttribute("href", dataStr);
  dlAnchor.setAttribute("download", `land_records_${Date.now()}.json`);
  dlAnchor.click();
}

function importData(input){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const imported = JSON.parse(e.target.result);
      if(Array.isArray(imported)){
        records = imported;
        saveLocalData();
        renderList();
        alert('นำเข้าข้อมูลสำเร็จแล้ว!');
      }else{
        alert('รูปแบบไฟล์ข้อมูลนำเข้าไม่ถูกต้อง');
      }
    } catch (err) {
      alert('เกิดข้อผิดพลาดในการอ่านไฟล์');
    }
  };
  reader.readAsText(file);
}
