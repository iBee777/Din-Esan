
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>v6.3 CLEAN FINAL</title>
</head>
<body>

<h2>Realtime Sheet Sync (NO LINE / NO CACHE)</h2>

<input id="name" placeholder="name">
<input id="phone" placeholder="phone">
<input id="note" placeholder="note">
<button onclick="save()">Save</button>

<hr>

<div id="list"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyYK990QABTxQWqvLzePhQMXaQvG5xsoU-rRCc-3tdLYiZpujHd2swPP0uL6fl3HMMK/exec";

async function save(){
  await fetch(API, {
    method: "POST",
    body: JSON.stringify({
      name: name.value,
      phone: phone.value,
      note: note.value
    })
  });

  load();
}

async function load(){
  const res = await fetch(API + "?action=list&t=" + Date.now());
  const data = await res.json();

  const box = document.getElementById("list");
  box.innerHTML = "";

  data.records.forEach(r => {
    box.innerHTML += `
      <div style="padding:8px;border-bottom:1px solid #ddd">
        <b>${r.name}</b> | ${r.phone} | ${r.note}
      </div>
    `;
  });
}

setInterval(load, 2000);
load();
</script>

</body>
</html>
